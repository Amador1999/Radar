<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MagClonk® LIVE Hotspot Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Librăria pentru gruparea punctelor (Clustering) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; display: flex; height: 100vh; background: #000; overflow: hidden; }
        #sidebar { width: 180px; background: rgba(0,0,0,0.9); border-right: 2px solid #d4af37; display: flex; flex-direction: column; z-index: 1000; }
        #sidebar-header { padding: 12px 5px; background: #000; text-align: center; border-bottom: 2px solid #d4af37; }
        #sidebar-header h1 { color: #d4af37; margin: 0; font-size: 14px; text-transform: uppercase; }
        #device-list { flex: 1; overflow-y: auto; padding: 8px; }
        .device-item { background: #1a1a1a; margin-bottom: 5px; padding: 10px; border-radius: 4px; cursor: pointer; border: 1px solid #333; color: #fff; font-size: 10px; text-align: center; }
        .device-item.active { background: #d4af37 !important; color: #000; font-weight: bold; }
        #map { flex: 1; background: #000; }
        /* Stilul numerelor de pe Hotspot-uri */
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background-color: rgba(212, 175, 55, 0.6); }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div { background-color: rgba(212, 175, 55, 1); color: #000; font-weight: bold; }
        @media (max-width: 600px) { #sidebar { width: 95px; } .device-item { font-size: 8px; padding: 5px 2px; } }
    </style>
</head>
<body>
<div id="sidebar">
    <div id="sidebar-header"><h1>MagClonk®</h1><div style="font-size:7px; color:#0f0;">HOTSPOT RADAR ●</div></div>
    <div id="device-list"></div>
</div>
<div id="map"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import * as L from "https://unpkg.com/leaflet@1.9.4/dist/leaflet-src.esm.js";
    import "https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC-fJK7QwOZqwSNwXZQ-Gs3MWBRAJM_Uo8",
        authDomain: "magclonk-new.firebaseapp.com",
        databaseURL: "https://magclonk-new-default-rtdb.firebaseio.com",
        projectId: "magclonk-new",
        storageBucket: "magclonk-new.firebasestorage.app",
        messagingSenderId: "545285788202",
        appId: "1:545285788202:web:26eed29ddff91f5c9ae953"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const map = L.map('map', { zoomControl: false }).setView([45.2, 29.3], 8);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { pane: 'shadowPane' }).addTo(map);

    let currentClusterLayer = null;
    const deviceListContainer = document.getElementById('device-list');

    signInAnonymously(auth).then(() => {
        onValue(ref(db, 'devices'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            deviceListContainer.innerHTML = "";
            Object.keys(data).forEach(mac => {
                const item = document.createElement('div');
                item.className = 'device-item';
                item.innerText = mac;
                item.onclick = async () => {
                    document.querySelectorAll('.device-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    
                    if (currentClusterLayer) map.removeLayer(currentClusterLayer);
                    currentClusterLayer = L.markerClusterGroup({
                        maxClusterRadius: 30, 
                        disableClusteringAtZoom: 18
                    });

                    const historyRef = ref(db, `devices/${mac}/gps_history`);
                    const historySnap = await get(historyRef);
                    
                    if (historySnap.exists()) {
                        const points = historySnap.val();
                        let lastCoords = null;
                        Object.values(points).forEach(p => {
                            if (p.lat && p.lng) {
                                const marker = L.marker([p.lat, p.lng]).bindPopup(`MAC: ${mac}<br>Data: ${new Date(p.timestamp).toLocaleString()}`);
                                currentClusterLayer.addLayer(marker);
                                lastCoords = [p.lat, p.lng];
                            }
                        });
                        map.addLayer(currentClusterLayer);
                        if (lastCoords) map.flyTo(lastCoords, 14);
                    } else {
                        alert("Dispozitivul nu are istoric GPS.");
                    }
                };
                deviceListContainer.appendChild(item);
            });
        });
    });
</script>
</body>
</html>
