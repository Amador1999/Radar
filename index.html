<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MagClonk® LIVE Satellite Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; display: flex; height: 100vh; background: #000; overflow: hidden; }
        
        /* SIDEBAR ULTRA-SLIM */
        #sidebar { 
            width: 200px; 
            background: rgba(0, 0, 0, 0.9); 
            border-right: 2px solid #d4af37; 
            display: flex; 
            flex-direction: column; 
            z-index: 1000; 
            box-shadow: 5px 0 15px rgba(0,0,0,0.5); 
        }

        #sidebar-header { padding: 12px 5px; background: #000; text-align: center; border-bottom: 1px solid #d4af37; }
        #sidebar-header h1 { color: #d4af37; margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        
        #device-list { flex: 1; overflow-y: auto; padding: 8px; }
        .device-item { 
            background: #1a1a1a; margin-bottom: 5px; padding: 8px; border-radius: 4px; 
            cursor: pointer; border: 1px solid #333; color: #fff; transition: 0.2s;
        }
        .device-item:hover { border-color: #d4af37; }
        .device-item.active { background: #d4af37 !important; color: #000; font-weight: bold; border-color: #fff; }
        .device-mac { font-family: monospace; font-size: 10px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #map { flex: 1; background: #000; }

        /* AJUSTĂRI PENTRU IPHONE */
        @media (max-width: 600px) {
            #sidebar { width: 90px !important; }
            #sidebar-header h1 { font-size: 10px !important; }
            .device-mac { font-size: 8px !important; }
            .leaflet-control-zoom { display: none; }
        }

        /* Popup fix */
        .leaflet-popup-content-wrapper { background: #000; color: #fff; border: 1px solid #d4af37; }
        .leaflet-popup-tip { background: #d4af37; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-header">
        <h1>MagClonk®</h1>
        <div id="status" style="font-size: 7px; color: #0f0; margin-top: 3px;">RADAR ACTIV ●</div>
    </div>
    <div id="device-list">
        <p style="text-align: center; color: #666; font-size: 9px;">Se caută...</p>
    </div>
</div>

<div id="map"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import * as L from "https://unpkg.com/leaflet@1.9.4/dist/leaflet-src.esm.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC-fJK7QwOZqwSNwXZQ-Gs3MWBRAJM_Uo8",
        authDomain: "magclonk-new.firebaseapp.com",
        databaseURL: "https://magclonk-new-default-rtdb.firebaseio.com",
        projectId: "magclonk-new",
        storageBucket: "magclonk-new.firebasestorage.app",
        messagingSenderId: "545285788202",
        appId: "1:545285788202:web:26eed29ddff91f5c9ae953"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    
    // Configurare Hartă
    const map = L.map('map', { zoomControl: false }).setView([45.2, 29.3], 9); // Zoom pe Deltă
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // STRATUL 1: IMAGINI SATELIT (Esri World Imagery)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
    }).addTo(map);

    // STRATUL 2: ETICHETE RÂURI/ORAȘE (Opțional, pentru orientare)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'shadowPane'
    }).addTo(map);

    const markers = {};
    const listContainer = document.getElementById('device-list');

    signInAnonymously(auth).then(() => {
        onValue(ref(db, 'devices'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            listContainer.innerHTML = "";
            
            Object.keys(data).forEach(mac => {
                const dev = data[mac];
                if (dev.lat && dev.lng) {
                    const lat = parseFloat(dev.lat);
                    const lng = parseFloat(dev.lng);
                    const hours = dev.total_hours ? dev.total_hours.toFixed(1) : "0";

                    if (markers[mac]) {
                        markers[mac].setLatLng([lat, lng]);
                    } else {
                        markers[mac] = L.marker([lat, lng]).addTo(map)
                            .bindPopup(`<b>Dispozitiv MagClonk</b><br>MAC: ${mac}<br>Ore: ${hours}h`);
                    }

                    const item = document.createElement('div');
                    item.className = 'device-item';
                    item.innerHTML = `<span class="device-mac">${mac}</span>`;
                    item.onclick = () => {
                        document.querySelectorAll('.device-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        map.flyTo([lat, lng], 15, { duration: 1.5 }); // Zoom puternic pe barcă
                        markers[mac].openPopup();
                    };
                    listContainer.appendChild(item);
                }
            });
        });
    });
</script>
</body>
</html>
