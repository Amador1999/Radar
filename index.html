<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MagClonk® Hotspot Radar v3</title>
    
    <!-- Resurse Hartă -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; display: flex; height: 100vh; background: #000; overflow: hidden; }
        #sidebar { width: 180px; background: rgba(0,0,0,0.9); border-right: 2px solid #d4af37; display: flex; flex-direction: column; z-index: 1000; }
        #sidebar-header { padding: 12px 5px; background: #000; text-align: center; border-bottom: 2px solid #d4af37; }
        #sidebar-header h1 { color: #d4af37; margin: 0; font-size: 14px; text-transform: uppercase; }
        #device-list { flex: 1; overflow-y: auto; padding: 8px; }
        .device-item { background: #1a1a1a; margin-bottom: 5px; padding: 10px; border-radius: 4px; cursor: pointer; border: 1px solid #333; color: #fff; font-size: 10px; text-align: center; transition: 0.2s; }
        .device-item.active { background: #d4af37 !important; color: #000; font-weight: bold; }
        #map { flex: 1; background: #000; }
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background-color: rgba(212, 175, 55, 0.6) !important; }
        .marker-cluster div { background-color: rgba(212, 175, 55, 1) !important; color: #000 !important; font-weight: bold !important; }
        @media (max-width: 600px) { #sidebar { width: 100px; } .device-item { font-size: 8px; padding: 6px 2px; } }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-header">
        <h1>MagClonk®</h1>
        <div id="status" style="font-size: 7px; color: #0f0;">HOTSPOT V3 ●</div>
    </div>
    <div id="device-list">
        <p style="text-align:center; color:#555; font-size:9px; margin-top:20px;">Se încarcă...</p>
    </div>
</div>

<div id="map"></div>

<!-- Scripturi Clasice (Nu Module) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
    // Configurația ta Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyC-fJK7QwOZqwSNwXZQ-Gs3MWBRAJM_Uo8",
        authDomain: "magclonk-new.firebaseapp.com",
        databaseURL: "https://magclonk-new-default-rtdb.firebaseio.com",
        projectId: "magclonk-new",
        storageBucket: "magclonk-new.firebasestorage.app",
        messagingSenderId: "545285788202",
        appId: "1:545285788202:web:26eed29ddff91f5c9ae953"
    };

    // Inițializare Firebase (Versiunea 8 - Stabilă)
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Inițializare Hartă
    const map = L.map('map', { zoomControl: false }).setView([45.2, 29.3], 8);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'MagClonk Satellite'
    }).addTo(map);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { pane: 'shadowPane' }).addTo(map);

    let currentClusterLayer = null;
    const deviceListContainer = document.getElementById('device-list');

    // Autentificare Anonimă
    firebase.auth().signInAnonymously().then(() => {
        // Ascultăm lista de dispozitive
        db.ref('devices').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            
            deviceListContainer.innerHTML = "";
            Object.keys(data).forEach(mac => {
                const item = document.createElement('div');
                item.className = 'device-item';
                item.innerText = mac;
                
                item.onclick = function() {
                    // Marcare activ în listă
                    document.querySelectorAll('.device-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    
                    // Curățare hartă
                    if (currentClusterLayer) map.removeLayer(currentClusterLayer);
                    currentClusterLayer = L.markerClusterGroup({
                        maxClusterRadius: 40,
                        showCoverageOnHover: false
                    });

                    // Citire Istoric GPS
                    db.ref('devices/' + mac + '/gps_history').get().then((historySnap) => {
                        if (historySnap.exists()) {
                            const points = historySnap.val();
                            let lastPos = null;
                            
                            Object.values(points).forEach(p => {
                                if (p.lat && p.lng) {
                                    const marker = L.marker([p.lat, p.lng])
                                        .bindPopup("<b>MAC:</b> " + mac + "<br><b>Data:</b> " + new Date(p.timestamp).toLocaleString());
                                    currentClusterLayer.addLayer(marker);
                                    lastPos = [p.lat, p.lng];
                                }
                            });
                            
                            map.addLayer(currentClusterLayer);
                            if (lastPos) map.flyTo(lastPos, 14);
                        } else {
                            alert("Nu există istoric GPS pentru acest MAC.");
                        }
                    });
                };
                deviceListContainer.appendChild(item);
            });
        });
    }).catch(err => console.error("Eroare Auth:", err));
</script>
</body>
</html>
