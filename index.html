<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MagClonk® LIVE Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; display: flex; height: 100vh; background: #f4f4f4; color: #333; overflow: hidden; }
        
        /* Sidebar SUBȚIRE */
        #sidebar { 
            width: 220px; 
            background: #fff; 
            border-right: 2px solid #d4af37; 
            display: flex; 
            flex-direction: column; 
            z-index: 1000; 
            box-shadow: 5px 0 15px rgba(0,0,0,0.1); 
        }

        #sidebar-header { 
            padding: 15px 10px; 
            background: #000; 
            border-bottom: 2px solid #d4af37; 
            text-align: center; 
        }

        #sidebar-header h1 { 
            color: #d4af37; 
            margin: 0; 
            font-size: 18px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        #status-bar { font-size: 9px; margin-top: 8px; color: #aaa; text-transform: uppercase; }
        
        #device-list { flex: 1; overflow-y: auto; padding: 10px; }

        .device-item { 
            background: #f9f9f9; 
            margin-bottom: 8px; 
            padding: 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            border: 1px solid #ddd; 
            transition: 0.2s;
        }

        .device-item:hover { border-color: #d4af37; background: #fff; }
        .device-item.active { background: #d4af37; color: black; border-color: #000; font-weight: bold; }
        
        .device-mac { font-family: monospace; font-size: 11px; display: block; overflow: hidden; text-overflow: ellipsis; }
        .device-meta { font-size: 10px; margin-top: 3px; opacity: 0.7; }

        #map { flex: 1; background: #e5e3df; }

        /* Adaptare specială pentru Mobil/iPhone */
        @media (max-width: 600px) {
            #sidebar { width: 130px; } 
            #sidebar-header h1 { font-size: 13px; letter-spacing: 1px; }
            .device-mac { font-size: 9px; }
            .device-meta { display: none; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-header">
        <h1>MagClonk®</h1>
        <div id="status-bar">Conectare...</div>
    </div>
    <div id="device-list">
        <p style="text-align: center; color: #999; font-size: 10px; margin-top: 30px;">Se încarcă flota...</p>
    </div>
</div>

<div id="map"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import * as L from "https://unpkg.com/leaflet@1.9.4/dist/leaflet-src.esm.js";

    // Configurația ta Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyC-fJK7QwOZqwSNwXZQ-Gs3MWBRAJM_Uo8",
        authDomain: "magclonk-new.firebaseapp.com",
        databaseURL: "https://magclonk-new-default-rtdb.firebaseio.com",
        projectId: "magclonk-new",
        storageBucket: "magclonk-new.firebasestorage.app",
        messagingSenderId: "545285788202",
        appId: "1:545285788202:web:26eed29ddff91f5c9ae953"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    
    // Inițializare hartă (Zoom-ul în dreapta jos ca să nu încurce pe mobil)
    const map = L.map('map', { zoomControl: false }).setView([45.9432, 24.9668], 6);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const markers = {};
    const statusBox = document.getElementById('status-bar');
    const listContainer = document.getElementById('device-list');

    // Autentificare anonimă pentru a trece de regulile Firebase
    signInAnonymously(auth).then(() => {
        statusBox.innerHTML = "Sistem Online ●";
        statusBox.style.color = "#0f0";

        // Ascultare date dispozitive
        onValue(ref(db, 'devices'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            listContainer.innerHTML = "";
            
            Object.keys(data).forEach(mac => {
                const dev = data[mac];
                if (dev.lat && dev.lng) {
                    const lat = parseFloat(dev.lat);
                    const lng = parseFloat(dev.lng);
                    const hours = dev.total_hours ? dev.total_hours.toFixed(1) : "0";

                    if (markers[mac]) {
                        markers[mac].setLatLng([lat, lng]);
                    } else {
                        markers[mac] = L.marker([lat, lng]).addTo(map)
                            .bindPopup(`<b>MAC:</b> ${mac}<br><b>Utilizare:</b> ${hours}h`);
                    }

                    const item = document.createElement('div');
                    item.className = 'device-item';
                    item.innerHTML = `<span class="device-mac">${mac}</span><div class="device-meta">🕒 ${hours}h</div>`;
                    item.onclick = () => {
                        document.querySelectorAll('.device-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        map.flyTo([lat, lng], 14, { duration: 1.5 });
                        markers[mac].openPopup();
                    };
                    listContainer.appendChild(item);
                }
            });
        });
    }).catch(err => {
        statusBox.innerHTML = "Eroare Securitate";
        statusBox.style.color = "red";
    });
</script>
</body>
</html>
